<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>平板设备外壳模板 - {{DEVICE_NAME}}</title>
  <style>
    /* 设备尺寸变量(由 preview 子命令从 device_models.py 注入) */
    :root {
      --device-width: {{DEVICE_WIDTH}}px;
      --device-height: {{DEVICE_HEIGHT}}px;
      --device-corner-radius: {{DEVICE_CORNER_RADIUS}}px;
      --device-border-width: {{DEVICE_BORDER_WIDTH}}px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      /* 平板尺寸较大,缩小整体显示 */
      transform: scale(0.6);
      transform-origin: center center;
    }

    /* 平板外壳容器 */
    .device-shell {
      position: relative;
      width: var(--device-width);
      height: var(--device-height);
      border-radius: var(--device-corner-radius);
      border: var(--device-border-width) solid #1a1a1a;
      background: #1a1a1a;
      box-shadow:
        0 0 0 2px #333,
        0 20px 60px rgba(0, 0, 0, 0.3),
        inset 0 0 4px rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    /* 屏幕(实际内容区域) */
    .device-screen {
      width: 100%;
      height: 100%;
      border-radius: calc(var(--device-corner-radius) - var(--device-border-width));
      overflow: hidden;
      background: #ffffff;
      position: relative;
    }

    /* 平板无刘海,但有前置摄像头圆点(装饰) */
    .camera-dot {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: #333;
      border-radius: 50%;
      z-index: 100;
    }

    /* 侧边按钮(装饰,可选) */
    .device-shell::before {
      content: "";
      position: absolute;
      left: -2px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60px;
      background: #333;
      border-radius: 2px 0 0 2px;
    }

    .device-shell::after {
      content: "";
      position: absolute;
      right: -2px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 40px;
      background: #333;
      border-radius: 0 2px 2px 0;
    }

    /* 预览内容容器(由 preview 子命令注入实际页面内容) */
    .preview-content {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* 设备信息标签(调试用,可移除) */
    .device-label {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      transform: scale(1.67); /* 反转 body 的 scale(0.6) */
      transform-origin: bottom left;
    }
  </style>
</head>
<body>
  <div class="device-shell">
    <div class="camera-dot"></div>
    <div class="device-screen">
      <div class="preview-content">
        <!-- 页面内容由 preview 子命令注入 -->
        {{PREVIEW_CONTENT}}
      </div>
    </div>
  </div>
  <div class="device-label">{{DEVICE_NAME}} - {{DEVICE_WIDTH}}x{{DEVICE_HEIGHT}}</div>
</body>
</html>
