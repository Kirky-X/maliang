<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>手机设备外壳模板 - {{DEVICE_NAME}}</title>
  <style>
    /* === Element Plus CSS 变量命名空间(设备外壳专用)==
       颜色用 --el-device-* 前缀,与 Element Plus 主题变量隔离,
       但命名风格对齐(--el-* 命名空间规范)。
       preview 子命令注入 token 时,优先映射到这些变量。 */
    :root {

      /* 设备尺寸变量(由 preview 子命令从 device_models.py 注入) */
      --device-width: {
          {
          DEVICE_WIDTH
        }
      }

      px;

      --device-height: {
          {
          DEVICE_HEIGHT
        }
      }

      px;

      --device-corner-radius: {
          {
          DEVICE_CORNER_RADIUS
        }
      }

      px;

      --device-border-width: {
          {
          DEVICE_BORDER_WIDTH
        }
      }

      px;

      --device-has-notch: {
          {
          DEVICE_HAS_NOTCH
        }
      }

      ;

      /* 设备外观变量(钛金属 iPhone 15 风格) */
      --el-device-titanium-light: #C8C9CB;
      --el-device-titanium-mid: #8E8F92;
      --el-device-titanium-dark: #5A5B5E;
      --el-device-titanium-gradient: linear-gradient(135deg,
        var(--el-device-titanium-light) 0%,
        var(--el-device-titanium-mid) 40%,
        var(--el-device-titanium-dark) 60%,
        var(--el-device-titanium-mid) 80%,
        var(--el-device-titanium-light) 100%);
      --el-device-bezel: #0A0A0B;
      --el-device-bezel-inner: #1C1C1E;
      --el-device-screen-bg: #FFFFFF;
      --el-device-notch-bg: #0A0A0B;
      --el-device-button-bg: #2C2C2E;
      --el-device-home-indicator: rgba(0, 0, 0, 0.85);
      --el-device-shadow-ambient: rgba(0, 0, 0, 0.18);
      --el-device-shadow-key: rgba(0, 0, 0, 0.35);
      --el-device-shadow-inner: rgba(255, 255, 255, 0.08);
      --el-device-highlight: rgba(255, 255, 255, 0.45);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 30%, #E8E9EC 0%, #D1D3D8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "HarmonyOS Sans", "Segoe UI", Roboto, sans-serif;
      padding: 40px 20px;
    }

    /* === 手机外壳容器 ===
       真实 iPhone 15 钛金属边框,通过多层背景渐变模拟金属质感。
       border-width 约 12px(对应物理 3mm 钛金属边框)。 */
    .device-shell {
      position: relative;
      width: var(--device-width);
      height: var(--device-height);
      border-radius: var(--device-corner-radius);
      background: var(--el-device-titanium-gradient);
      padding: var(--device-border-width);
      box-shadow:
        /* 环境光(柔和散射) */
        0 0 0 1px rgba(255, 255, 255, 0.6) inset,
        /* 钛金属边框内高光 */
        0 0 0 2px var(--el-device-titanium-dark) inset,
        /* 屏幕黑边过渡 */
        0 0 0 4px var(--el-device-bezel) inset,
        /* 主投影(向下) */
        0 25px 50px -12px var(--el-device-shadow-key),
        /* 环境投影(向上扩散) */
        0 8px 20px -8px var(--el-device-shadow-ambient),
        /* 接触面阴影 */
        0 2px 4px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    /* 钛金属边框光泽(顶部高光) */
    .device-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--device-corner-radius);
      background: linear-gradient(180deg,
          var(--el-device-highlight) 0%,
          transparent 8%,
          transparent 92%,
          rgba(0, 0, 0, 0.3) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* === 屏幕(实际内容区域)==
       屏幕圆角 = 外壳圆角 - 边框宽度,保持视觉连贯。 */
    .device-screen {
      width: 100%;
      height: 100%;
      border-radius: calc(var(--device-corner-radius) - var(--device-border-width));
      overflow: hidden;
      background: var(--el-device-screen-bg);
      position: relative;
      z-index: 1;
    }  按键用绝对定位的伪元素,实际不占空间。 */
    .device-buttons-left,
    .device-buttons-right {
      position: absolute;
      top: 0;
      width: 3px;
      height: 100%;
      pointer-events: none;
      z-index: 3;
    }
    .device-buttons-left { left: -3px; }
    .device-buttons-right { right: -3px; }

    .device-buttons-left::before,
    .device-buttons-left::after,
    .device-buttons-right::before,
    .device-volume-down {
      content: "";
      position: absolute;
      width: 3px;
      background: linear-gradient(90deg,
        var(--el-device-titanium-dark) 0%,
        var(--el-device-button-bg) 30%,
        var(--el-device-button-bg) 70%,
        var(--el-device-titanium-dark) 100%);
      border-radius: 1px 0 0 1px;
    }

    /* 静音键(左侧上方,小红点 - 仅装饰) */
    .device-buttons-left::before {
      top: 18%;
      height: 22px;
      background: linear-gradient(90deg, #8B0000 0%, #5C0000 50%, #3A0000 100%);
    }

    /* 音量上 */
    .device-buttons-left::after {
      top: 28%;
      height: 40px;
      box-shadow: 0 1px 0 var(--el-device-titanium-dark);
    }

    /* 音量下(左侧,音量上下方,独立伪元素需额外容器) */
    .device-volume-down {
      left: -3px;
      top: calc(28% + 50px);
      height: 40px;
    }

    /* 电源键(右侧,长度 60px,位于上 1/3) */
    .device-buttons-right::before {
      top: 22%;
      height: 60px;
      border-radius: 0 1px 1px 0;
      background: linear-gradient(270deg,
        var(--el-device-titanium-dark) 0%,
        var(--el-device-button-bg) 30%,
        var(--el-device-button-bg) 70%,
        var(--el-device-titanium-dark) 100%);
    }

    /* === Home Indicator(iPhone 全面屏)==
       底部圆角横条,宽 134px 高 5px,距底部 8px。 */
    .device-home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: var(--el-device-home-indicator);
      border-radius: 3px;
      z-index: 90;
      opacity: 0.9;
    }

    /* === 预览内容容器 ===
       由 preview 子命令注入实际页面内容(Element Plus 组件)。
       添加底部 padding 避免 home indicator 遮挡内容。 */
    .preview-content {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 24px;
    }

    /* === 设备信息标签(调试用)== */
    .device-label {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.78);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 11px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="device-shell" data-notch="{{DEVICE_HAS_NOTCH}}">
    <div class="device-buttons-left"></div>
    <div class="device-volume-down"></div>
    <div class="device-buttons-right"></div>
    <div class="device-notch"></div>
    <div class="device-screen">
      <div class="preview-content">
        <!-- 页面内容由 preview 子命令注入(Element Plus 组件) -->
        {{PREVIEW_CONTENT}}
      </div>
    </div>
    <div class="device-home-indicator"></div>
  </div>
  <div class="device-label">{{DEVICE_NAME}} · {{DEVICE_WIDTH}}×{{DEVICE_HEIGHT}}</div>
</body>
</html>
